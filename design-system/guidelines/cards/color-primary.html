<!-- @dsCard group="Colors" viewport="700x150" name="Primary · Terracotta" subtitle="Brand core — tegole, cotto, portici" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--cream-100); }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-warm); font-family: var(--font-mono); }
  .sw { height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 7px 6px; }
  .sw b { font-size: 11px; font-weight: 700; line-height: 1.1; }
  .sw span { font-size: 9px; opacity: .8; }
  .lo b, .lo span { color: var(--ink-900); }
  .hi b, .hi span { color: #fff; }
  .tag { display:inline-block; margin: 0 0 10px; font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink-500); }
</style>
</head>
<body>
  <span class="tag">--primary-* · brand 600 <code style="font-family:var(--font-mono)">#C0492C</code></span>
  <div class="ramp">
    <div class="sw lo" style="background:var(--primary-50)"><b>50</b></div>
    <div class="sw lo" style="background:var(--primary-100)"><b>100</b></div>
    <div class="sw lo" style="background:var(--primary-200)"><b>200</b></div>
    <div class="sw lo" style="background:var(--primary-300)"><b>300</b></div>
    <div class="sw hi" style="background:var(--primary-400)"><b>400</b></div>
    <div class="sw hi" style="background:var(--primary-500)"><b>500</b></div>
    <div class="sw hi" style="background:var(--primary-600)"><b>600</b><span>brand</span></div>
    <div class="sw hi" style="background:var(--primary-700)"><b>700</b><span>cta</span></div>
    <div class="sw hi" style="background:var(--primary-800)"><b>800</b></div>
    <div class="sw hi" style="background:var(--primary-900)"><b>900</b></div>
    <div class="sw hi" style="background:var(--primary-950)"><b>950</b></div>
  </div>
</body>
</html>
