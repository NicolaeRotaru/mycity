<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Griglia 4px — Tailwind ramp" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream-100); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--primary-600); border-radius: var(--radius-sm) var(--radius-sm) 0 0; width: 26px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); margin-top: 6px; font-weight: 700; }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--ink-400); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="n">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="n">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">16</div><div class="px">64</div></div>
  </div>
</body>
</html>
