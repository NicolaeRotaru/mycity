<!-- @dsCard group="Type" viewport="700x300" name="Display scale · Fraunces" subtitle="Titoli serif, tracking -0.01em, line-height stretto" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--cream-100); font-family: var(--font-serif); color: var(--ink-900); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px dashed var(--cream-300); }
  .line:last-child { border-bottom: 0; }
  .t { font-weight: 700; letter-spacing: -0.01em; line-height: 1.05; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); white-space: nowrap; margin-left: auto; }
</style>
</head>
<body>
  <div class="line"><span class="t" style="font-size:60px">Aa</span><span class="tag">6xl · 60</span></div>
  <div class="line"><span class="t" style="font-size:48px">I negozi veri</span><span class="tag">5xl · 48</span></div>
  <div class="line"><span class="t" style="font-size:36px">Come funziona</span><span class="tag">4xl · 36</span></div>
  <div class="line"><span class="t" style="font-size:30px">Sostieni i negozi di Piacenza</span><span class="tag">3xl · 30</span></div>
  <div class="line"><span class="t" style="font-size:24px">Prodotti che vanno forte</span><span class="tag">2xl · 24</span></div>
</body>
</html>
