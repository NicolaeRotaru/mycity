<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-100); font-family: var(--font-sans); }
  .sec { margin-bottom: 20px; }
  .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--ink-500); margin-bottom: 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ct { font-family: var(--font-serif); font-weight: 700; color: var(--ink-900); font-size: 15px; margin-bottom: 4px; }
  .cp { font-size: 12px; color: var(--ink-500); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Card } = window.MyCityDesignSystem_105480;
    function Demo() {
      return (
        <>
          <div className="sec">
            <div className="lbl">Button · variants</div>
            <div className="row">
              <Button variant="primary">Esplora</Button>
              <Button variant="accent" icon="shopping-cart">Aggiungi al carrello</Button>
              <Button variant="secondary" iconRight="arrow-right">Negozi</Button>
              <Button variant="ghost">Salta</Button>
              <Button variant="success" icon="check">Confermato</Button>
              <Button variant="danger" icon="trash-2">Elimina</Button>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">Sizes · shape · state</div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg" iconRight="arrow-right">Large</Button>
              <Button shape="pill" variant="accent">Pill</Button>
              <Button loading>Salvataggio…</Button>
              <Button disabled>Disabilitato</Button>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">Badge</div>
            <div className="row">
              <Badge variant="discount">-30%</Badge>
              <Badge variant="new">Nuovo</Badge>
              <Badge variant="soldout">Esaurito</Badge>
              <Badge variant="lowstock" icon="flame">Ultimi 2</Badge>
              <Badge variant="free" icon="truck">Sped. gratis</Badge>
              <Badge variant="local">Negozio locale</Badge>
              <Badge variant="urgency">Solo oggi</Badge>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">Card</div>
            <div className="cards">
              <Card variant="bordered"><div className="ct">Bordered</div><div className="cp">Bianco + bordo crema</div></Card>
              <Card variant="elevated"><div className="ct">Elevated</div><div className="cp">Ombra calda terracotta</div></Card>
              <Card variant="flat"><div className="ct">Flat</div><div className="cp">Superficie crema</div></Card>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
