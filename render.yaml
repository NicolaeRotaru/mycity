# Render config — Production (web) + Preview deploy su PR.
#
# Esperti: SRE: "Preview deploy = staging gratis per ogni PR.
# Catch regression PRIMA di merge."
#
# Per applicare: aprire Render dashboard → New → Blueprint → select repo
# → questo file viene parsato automaticamente.

# Preview environment automatici per ogni PR. NB: la vecchia sintassi a livello
# service (previewsEnabled / previewsExpireAfterDays) è DEPRECATA da Render e fa
# fallire il parsing del Blueprint ("field not found in type file.Service").
# Va usata questa sezione `previews` a livello root.
previews:
  generation: automatic

services:
  - type: web
    name: mycity-marketplace
    runtime: node
    plan: starter # $7/mese; per traffico reale → $25 standard
    # ⚠️ Scale-out (più istanze): configurare PRIMA UPSTASH_* qui sotto, altrimenti
    # il rate-limit in-memory non è condiviso tra istanze ed è aggirabile (🟠-12).
    region: frankfurt # EU per GDPR + latenza Italia
    branch: main
    autoDeploy: true
    buildCommand: npm ci --legacy-peer-deps && NODE_OPTIONS=--max-old-space-size=4096 npm run build
    startCommand: npm start
    # Health check sull'endpoint che verifica DAVVERO il DB + env critiche
    # (ritorna 503 se degradato). NON usare "/" : la home può rispondere 200
    # con dati cached anche a DB irraggiungibile, mascherando un outage.
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Critical vars (devi settare manualmente nel dashboard):
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://mycity-marketplace.com
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false
      # Rate-limit distribuito (Upstash Redis). Opzionale su singola istanza
      # (fallback in-memory), OBBLIGATORIO prima dello scale-out (🟠-12).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

# =============================================================================
# CRON JOBS — gestiti ESTERNAMENTE su cron-job.org (GRATIS), non come Render
# cron service (a pagamento). Ogni job fa un POST autenticato all'endpoint, con
# header:  Authorization: Bearer <CRON_SECRET>   (lo stesso valore impostato
# qui sopra nel web service). Senza scheduler questi cron NON girano.
#
# Endpoint (POST) + cadenza consigliata:
#   https://mycity-marketplace.com/api/cron/release-payouts     ogni 15 min  (paga il seller ~1h dopo la consegna)
#   https://mycity-marketplace.com/api/cron/process-deletions   1×/giorno 04:00
#   https://mycity-marketplace.com/api/cron/send-emails         ogni 10 min
#   https://mycity-marketplace.com/api/cron/send-push           ogni 5 min
#   https://mycity-marketplace.com/api/cron/expire-checkouts    ogni 30 min
#   https://mycity-marketplace.com/api/cron/expire-stale-orders ogni 30 min  (annulla+rimborsa gli ordini NEW non accettati oltre 3h)
#   https://mycity-marketplace.com/api/cron/abandoned-carts     ogni 1 ora
#   https://mycity-marketplace.com/api/cron/operational-alerts  ogni 15 min
#   https://mycity-marketplace.com/api/cron/external-price-alerts  ogni 1 ora  (riprezzo/stock prodotti importati)
#
# Per riportarli su Render come servizi a pagamento, reintrodurre blocchi
# `- type: cron` (vedi storico git per il template).
# =============================================================================
