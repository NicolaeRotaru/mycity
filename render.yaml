# Render config — Preview deploy su PR + production.
#
# Esperti: SRE: "Preview deploy = staging gratis per ogni PR.
# Catch regression PRIMA di merge."
#
# Per applicare: aprire Render dashboard → New → Blueprint → select repo
# → questo file viene parsato automaticamente.

services:
  - type: web
    name: mycity-marketplace
    runtime: node
    plan: starter # $7/mese; per traffico reale → $25 standard
    region: frankfurt # EU per GDPR + latenza Italia
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    previewsEnabled: true # PR preview deploy
    previewsExpireAfterDays: 7
    envVars:
      - key: NODE_ENV
        value: production
      # Critical vars (devi settare manualmente nel dashboard):
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://mycity-marketplace.com
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false

  # Cron: rilascia i payout ai venditori a consegna +3gg (claw-back via reversal
  # per rimborsi tardivi). Giornaliero alle 03:00 UTC. In alternativa, uno
  # scheduler esterno (cron-job.org) che POSTa lo stesso endpoint con CRON_SECRET.
  - type: cron
    name: mycity-release-payouts
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 3 * * *"
    buildCommand: npm ci
    startCommand: 'curl -fsS -X POST -H "Authorization: Bearer $CRON_SECRET" "$NEXT_PUBLIC_APP_URL/api/cron/release-payouts"'
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://mycity-marketplace.com
